<style>
  body {
    background-color: #0d0d0d;
    color: #ffffff;
    font-family: "Courier New", monospace;
    text-align: center;
  }

  h1 {
    color: #ff2e63;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 15px;
  }

  .card {
    background-color: #1a1a1a;
    border-radius: 10px;
    padding: 15px;
    transition: 0.3s;
    text-align: center;
  }

  .card img {
    width: 100%;
    border-radius: 10px;
  }

  .name {
    font-size: 18px;
    margin-top: 10px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .c1 { border: 2px solid #C54635; }
  .c2 { border: 2px solid #B4324E; }
  .c3 { border: 2px solid #313131; }
  .c4 { border: 2px solid #6C1F31; }
  .c5 { border: 2px solid #14157E; }
  .c6 { border: 2px solid #471147; }
  .c7 { border: 2px solid #A82F2E; }
  .c8 { border: 2px solid #0F7A0E; }

  /* 会話ログ用 */
  .c9 {
    border: 2px solid #888;
  }

  .card:hover {
    transform: scale(1.05);
  }

  /* 会話ログだけボタン風 */
  .back {
    background: #444;
    text-decoration: none;
    color: white;
    display: block;
  }

  .back:hover {
    background: #666;
  }
</style>
</head>
