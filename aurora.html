<!DOCTYPE html>

<title>職員詳細 - オーロラ</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background-color: #111;
    color: #eee;
    margin: 0;
}

/* ヘッダー */
.header {
    background: #222;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    border-bottom: 2px solid #444;
}

/* メイン */
.container {
    display: flex;
    flex-direction: column;
    padding: 30px;
    gap: 20px;
}

/* 上段：写真 + プロフィール */
.top-section {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
}

/* 左側（画像） */
.left {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 画像 */
.profile-img {
    width: 250px;
    height: 300px;
}

/* 右側 */
.info {
    display: flex;
    flex-direction: column;
}

/* 名前 */
.name {
    font-size: 32px;
    border-bottom: 1px solid #555;
    padding-bottom: 5px;
    margin-bottom: 15px;
}

/* プロフィール */
.profile p {
    margin: 5px 0;
}

/* 区切り線 */
.divider {
    border: none;
    border-top: 1px solid #555;
    margin: 10px 0;
}

/* トラウマ */
.trauma {
    font-size: 16px;
    color: #FF0010; /* 赤色に変更 */
    margin-top: 10px;
}

/* 紹介文 */
.intro-section {
    max-width: 800px;
}

/* 見出し「自己紹介」 */
.intro-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #B4324E; /* 指定カラーに変更 */
}

/* 紹介文本文 */
.intro {
    font-size: 16px;
    line-height: 1.5;
    text-align: left;
}

/* 記録部分だけ白色（見出し＋本文） */
.record-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #ffffff; /* 白色に変更 */
}

.record-text {
    font-size: 16px;
    line-height: 1.5;
    text-align: left;
    color: #ffffff; /* 白色 */
}

/* 戻るボタン */
.back {
    display: inline-block;
    margin: 15px;
    padding: 10px 15px;
    background: #444;
    color: white;
    text-decoration: none;
}
.back:hover {
    background: #666;
}

/* スマホ対応 */
@media (max-width: 600px) {
    .top-section {
        flex-direction: column;
        align-items: center;
    }

    .profile-img {
        width: 80%;
        height: auto;
        margin-bottom: 15px;
    }

    .name {
        font-size: 24px;
    }

    .intro-section {
        max-width: 90%;
        text-align: center;
    }

    .intro-title {
        font-size: 20px;
    }
}
</style>
</head>

<body>
